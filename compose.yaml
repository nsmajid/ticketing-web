services:

  frontend:

    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: ticketing-web

    working_dir: /app

    ports:
      - "5173:5173"

    volumes:
      - .:/app
      - node_modules:/app/node_modules
      # - pnpm-store:/pnpm/store

    environment:
      CHOKIDAR_USEPOLLING: "true"

    stdin_open: true

    tty: true

volumes:
  node_modules:
  # pnpm-store: